<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor de Video</title>

    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        video {
            width: 90%;
            max-width: 800px;
            border-radius: 10px;
        }

        h2 {
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <video controls>
        <source src="video.mp4" type="video/mp4">
        Tu navegador no soporta videos HTML5.
    </video>

    <h2>Video</h2>

</body>
</html>
